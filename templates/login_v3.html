<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Destiny Engine Login</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap");

      :root {
        --bg-a: #020617;
        --bg-b: #0f172a;
        --ink: #e2e8f0;
        --muted: #94a3b8;
        --line: rgba(148, 163, 184, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 15% 10%, rgba(56, 189, 248, 0.24) 0%, rgba(56, 189, 248, 0) 40%),
          radial-gradient(circle at 80% 18%, rgba(14, 165, 233, 0.2) 0%, rgba(14, 165, 233, 0) 44%),
          linear-gradient(135deg, var(--bg-a), var(--bg-b));
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      .card {
        width: min(440px, 100%);
        border-radius: 1rem;
        border: 1px solid var(--line);
        background: rgba(2, 6, 23, 0.88);
        padding: 1.1rem;
        box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0;
        font-family: "Fraunces", Georgia, serif;
        font-size: 1.8rem;
      }

      .subtitle {
        margin: 0.45rem 0 0.9rem;
        color: #cbd5f5;
        font-size: 0.9rem;
      }

      form {
        display: grid;
        gap: 0.72rem;
      }

      label {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.25rem;
      }

      input {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.55);
        border-radius: 0.55rem;
        background: rgba(15, 23, 42, 0.78);
        color: #e2e8f0;
        padding: 0.62rem 0.7rem;
        font: inherit;
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0.6rem 0.95rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, #22d3ee, #38bdf8);
        color: #082f49;
      }

      .error {
        border: 1px solid #fca5a5;
        border-radius: 0.7rem;
        background: #fff1f2;
        color: #7f1d1d;
        padding: 0.65rem 0.72rem;
        font-size: 0.86rem;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Destiny Engine</h1>
      <p class="subtitle">Sign in to access the dashboard.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <input type="hidden" name="next" value="{{ next_url or '/' }}" />
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">Login</button>
      </form>
    </section>
  </body>
</html>
